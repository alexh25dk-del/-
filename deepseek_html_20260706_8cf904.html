<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mango_OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #0a0a1a;
        }

        /* ===== ЭКРАН ВХОДА ===== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3e, #0a0a1a);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .login-screen.hidden {
            opacity: 0;
            transform: scale(1.1);
            pointer-events: none;
        }

        .login-title {
            font-size: 64px;
            font-weight: 900;
            color: #ff8c00;
            text-shadow: 0 0 40px rgba(255, 140, 0, 0.4), 0 0 80px rgba(255, 140, 0, 0.2);
            letter-spacing: 4px;
            margin-bottom: 10px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .login-sub {
            font-size: 22px;
            color: #ffa500;
            opacity: 0.8;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 40px rgba(255, 140, 0, 0.4);
            }
            50% {
                text-shadow: 0 0 80px rgba(255, 140, 0, 0.8), 0 0 120px rgba(255, 140, 0, 0.3);
            }
        }

        .login-btn {
            background: linear-gradient(45deg, #ff8c00, #ffa500);
            border: none;
            color: #0a0a1a;
            font-size: 28px;
            font-weight: bold;
            padding: 18px 70px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 60px rgba(255, 140, 0, 0.3);
            letter-spacing: 2px;
        }

        .login-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 100px rgba(255, 140, 0, 0.6);
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        /* ===== ОСНОВНОЙ ЭКРАН Mango_OS ===== */
        .os-screen {
            width: 100%;
            height: 100vh;
            background: radial-gradient(ellipse at top, #1a1a3e, #0a0a1a);
            padding: 30px;
            display: none;
            flex-direction: column;
        }

        .os-screen.active {
            display: flex;
        }

        /* Верхняя панель */
        .os-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 140, 0, 0.1);
            margin-bottom: 30px;
        }

        .os-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .os-logo {
            font-size: 28px;
            font-weight: 900;
            color: #ff8c00;
            text-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
        }

        .os-time {
            color: #888;
            font-size: 14px;
        }

        .os-user {
            color: #ffa500;
            font-size: 14px;
            background: rgba(255, 140, 0, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 140, 0, 0.2);
        }

        /* ===== МЕНЮ С 4 КВАДРАТИКАМИ ===== */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 700px;
            width: 100%;
            margin: auto;
            animation: menuSlideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes menuSlideUp {
            0% {
                opacity: 0;
                transform: translateY(80px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .app-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .app-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 140, 0, 0.3);
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.15);
        }

        .app-card:active {
            transform: scale(0.95);
        }

        .app-icon {
            font-size: 56px;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 20px rgba(255, 140, 0, 0.2));
        }

        .app-name {
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .app-desc {
            color: #888;
            font-size: 12px;
            margin-top: 4px;
        }

        /* Цвета для разных приложений */
        .app-mango {
            border-color: rgba(255, 140, 0, 0.2);
        }
        .app-mango:hover {
            border-color: #ff8c00;
            box-shadow: 0 20px 60px rgba(255, 140, 0, 0.25);
        }

        .app-stream {
            border-color: rgba(255, 50, 50, 0.2);
        }
        .app-stream:hover {
            border-color: #ff3333;
            box-shadow: 0 20px 60px rgba(255, 50, 50, 0.25);
        }

        .app-sine {
            border-color: rgba(0, 200, 255, 0.2);
        }
        .app-sine:hover {
            border-color: #00ccff;
            box-shadow: 0 20px 60px rgba(0, 200, 255, 0.25);
        }

        .app-forum {
            border-color: rgba(0, 255, 150, 0.2);
        }
        .app-forum:hover {
            border-color: #00ff99;
            box-shadow: 0 20px 60px rgba(0, 255, 150, 0.25);
        }

        /* ===== МОДАЛЬНЫЕ ОКНА ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            animation: modalFade 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes modalFade {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-box {
            background: linear-gradient(145deg, #1a1a3e, #0f0f2a);
            border-radius: 40px;
            padding: 40px 50px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(255, 140, 0, 0.2);
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.8);
            position: relative;
            text-align: center;
        }

        .modal-box h2 {
            color: #ff8c00;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .modal-box p {
            color: #ccc;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .modal-box .modal-sub {
            color: #888;
            font-size: 14px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            margin-top: 10px;
        }

        .modal-close:hover {
            background: rgba(255, 140, 0, 0.2);
            border-color: #ff8c00;
        }

        /* Спец-стили для стрим-лайфа (две кнопки внутри) */
        .stream-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 15px 0;
        }

        .stream-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
            font-weight: 600;
        }

        .stream-btn:hover {
            background: rgba(255, 140, 0, 0.15);
            border-color: #ff8c00;
            transform: scale(1.05);
        }

        .stream-btn-max {
            border-color: rgba(255, 50, 50, 0.3);
        }
        .stream-btn-max:hover {
            border-color: #ff3333;
            background: rgba(255, 50, 50, 0.15);
        }

        .stream-btn-sidik {
            border-color: rgba(50, 200, 255, 0.3);
        }
        .stream-btn-sidik:hover {
            border-color: #50ccff;
            background: rgba(50, 200, 255, 0.15);
        }

        /* ===== Mango Farm (внутренняя механика) ===== */
        .farm-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .farm-emoji {
            font-size: 80px;
            transition: 0.15s;
            cursor: pointer;
            filter: drop-shadow(0 0 30px rgba(255, 140, 0, 0.2));
        }

        .farm-emoji:active {
            transform: scale(1.4);
            filter: drop-shadow(0 0 80px rgba(255, 140, 0, 0.8));
        }

        .farm-counter {
            font-size: 48px;
            font-weight: 900;
            color: #ff8c00;
        }

        .farm-label {
            color: #888;
            font-size: 14px;
        }

        .farm-btn {
            background: linear-gradient(45deg, #ff8c00, #ffa500);
            border: none;
            color: #0a0a1a;
            font-size: 20px;
            font-weight: bold;
            padding: 14px 40px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 5px;
        }

        .farm-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255, 140, 0, 0.4);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 600px) {
            .login-title {
                font-size: 36px;
            }
            .login-sub {
                font-size: 16px;
            }
            .menu-grid {
                gap: 15px;
            }
            .app-card {
                min-height: 130px;
                padding: 20px 15px;
            }
            .app-icon {
                font-size: 40px;
            }
            .app-name {
                font-size: 15px;
            }
            .modal-box {
                padding: 30px 25px;
            }
            .modal-box h2 {
                font-size: 22px;
            }
            .os-header {
                flex-wrap: wrap;
                gap: 8px;
            }
            .os-logo {
                font-size: 20px;
            }
        }

        /* Скрываем скролл */
        ::-webkit-scrollbar {
            width: 0;
        }
    </style>
</head>
<body>

    <!-- ========================================================= -->
    <!-- ЭКРАН ВХОДА -->
    <!-- ========================================================= -->
    <div class="login-screen" id="loginScreen">
        <div class="login-title">🥭 MANGO_OS</div>
        <div class="login-sub">for Alexeiy Tsetkov</div>
        <button class="login-btn" onclick="enterOS()">▶ НАЧАТЬ</button>
    </div>

    <!-- ========================================================= -->
    <!-- ОСНОВНОЙ ЭКРАН -->
    <!-- ========================================================= -->
    <div class="os-screen" id="osScreen">

        <!-- Верхняя панель -->
        <div class="os-header">
            <div class="os-header-left">
                <div class="os-logo">🥭 Mango_OS</div>
                <div class="os-time" id="osTime">--:--</div>
            </div>
            <div class="os-user">👤 Alexeiy Tsetkov</div>
        </div>

        <!-- Меню с 4 приложениями -->
        <div class="menu-grid">
            <!-- 1. Mango Farm -->
            <div class="app-card app-mango" onclick="openFarm()">
                <div class="app-icon">🥭</div>
                <div class="app-name">Mango Farm</div>
                <div class="app-desc">выращивай манго</div>
            </div>

            <!-- 2. Stream Life -->
            <div class="app-card app-stream" onclick="openStream()">
                <div class="app-icon">📺</div>
                <div class="app-name">Stream Life</div>
                <div class="app-desc">кто стримит?</div>
            </div>

            <!-- 3. SineBench -->
            <div class="app-card app-sine" onclick="openSine()">
                <div class="app-icon">⚡</div>
                <div class="app-name">SineBench</div>
                <div class="app-desc">тест реактора</div>
            </div>

            <!-- 4. Ледяной Форум -->
            <div class="app-card app-forum" onclick="openForum()">
                <div class="app-icon">❄️</div>
                <div class="app-name">Ледяной Форум</div>
                <div class="app-desc">соц. сеть</div>
            </div>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- ОБЩЕЕ МОДАЛЬНОЕ ОКНО -->
    <!-- ========================================================= -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box" id="modalBox">
            <!-- Контент будет подставляться через JS -->
            <div id="modalContent"></div>
            <button class="modal-close" onclick="closeModal()">✕ Закрыть</button>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- СКРИПТЫ -->
    <!-- ========================================================= -->
    <script>
        // ===== ВХОД В ОС =====
        function enterOS() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('osScreen').classList.add('active');

            // Обновляем время
            updateTime();
            setInterval(updateTime, 1000);
        }

        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('osTime').textContent = h + ':' + m;
        }

        // ===== ОТКРЫТИЕ/ЗАКРЫТИЕ МОДАЛКИ =====
        function openModal(html) {
            document.getElementById('modalContent').innerHTML = html;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // Закрытие по клику на фон
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // =============================================
        // 1. MANGO FARM (всё как на 2-м сайте)
        // =============================================
        let farmCount = 0;

        function openFarm() {
            const html = `
                <div class="farm-container">
                    <h2>🥭 Mango Farm</h2>
                    <div class="farm-emoji" id="farmEmoji" onclick="clickFarm()">🥭</div>
                    <div class="farm-counter" id="farmCounter">${farmCount}</div>
                    <div class="farm-label">манг собрано</div>
                    <button class="farm-btn" onclick="clickFarm()">🍊 Подержать манго</button>
                </div>
            `;
            openModal(html);
            // Перепривязываем клик на эмодзи (уже есть onclick)
        }

        function clickFarm() {
            farmCount++;
            const counter = document.getElementById('farmCounter');
            const emoji = document.getElementById('farmEmoji');
            if (counter) counter.textContent = farmCount;
            if (emoji) {
                emoji.style.transform = 'scale(1.5)';
                emoji.style.filter = 'drop-shadow(0 0 80px rgba(255,140,0,0.8))';
                setTimeout(() => {
                    emoji.style.transform = 'scale(1)';
                    emoji.style.filter = 'drop-shadow(0 0 30px rgba(255,140,0,0.2))';
                }, 200);
            }
            if (farmCount === 10) {
                setTimeout(() => alert('🤘 10 манго! Ты красавчик!'), 300);
            }
        }

        // =============================================
        // 2. STREAM LIFE
        // =============================================
        function openStream() {
            const html = `
                <h2>📺 Stream Life</h2>
                <p style="color:#888; margin-bottom:10px;">Сейчас никто не ведёт стрим</p>
                <p style="color:#aaa; margin-bottom:15px; font-size:14px;">Ваши подписки:</p>
                <div class="stream-buttons">
                    <button class="stream-btn stream-btn-max" onclick="streamMax()">🎮 Макс Стример</button>
                    <button class="stream-btn stream-btn-sidik" onclick="streamSidik()">🎙️ Сидик</button>
                </div>
            `;
            openModal(html);
        }

        function streamMax() {
            closeModal();
            setTimeout(() => {
                openModal(`
                    <h2>🎮 Макс Стример</h2>
                    <p>Недавний стрим:</p>
                    <p style="font-size:20px; color:#ff6b6b;">«Издеваюсь над Денисом»</p>
                    <div class="modal-sub">🔴 2 часа назад</div>
                `);
            }, 300);
        }

        function streamSidik() {
            closeModal();
            setTimeout(() => {
                openModal(`
                    <h2>🎙️ Сидик</h2>
                    <p>Последний стрим:</p>
                    <p style="font-size:20px; color:#50ccff;">«Погром ДНС»</p>
                    <div class="modal-sub">⏰ 5 часов назад</div>
                `);
            }, 300);
        }

        // =============================================
        // 3. SINEBENCH
        // =============================================
        function openSine() {
            openModal(`
                <h2>⚡ SineBench</h2>
                <p style="font-size:22px; color:#ff4444;">⚠️ ОШИБКА</p>
                <p>Подключите реактор для использования</p>
                <div class="modal-sub" style="margin-top:15px; color:#555;">🔌 реактор не обнаружен</div>
            `);
        }

        // =============================================
        // 4. ЛЕДЯНОЙ ФОРУМ
        // =============================================
        function openForum() {
            openModal(`
                <h2>❄️ Ледяной Форум</h2>
                <p style="font-size:22px; color:#ff6b6b;">⛔ ДОСТУП ЗАБЛОКИРОВАН</p>
                <p>Соц. сеть забанена</p>
                <p style="color:#888; margin-top:5px;">Гру. Ждите обновления.</p>
                <div class="modal-sub" style="margin-top:15px; color:#555;">🔄 ожидайте версию 2.0</div>
            `);
        }
    </script>

</body>
</html>
